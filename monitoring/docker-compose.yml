version: '3.9'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: freedomforge-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana:latest
    container_name: freedomforge-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../ops/grafana-dashboard.freedomforge.json:/var/lib/grafana/dashboards/freedomforge-dashboard.json:ro
    expose:
      - '3000'

  caddy:
    image: caddy:2
    container_name: freedomforge-caddy
    restart: unless-stopped
    depends_on:
      - grafana
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
      CADDY_BASICAUTH_HASH: ${CADDY_BASICAUTH_HASH:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - '80:80'
      - '443:443'

volumes:
  prometheus-data:
  grafana-data:
  caddy-data:
  caddy-config:
