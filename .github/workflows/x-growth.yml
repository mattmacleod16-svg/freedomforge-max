name: X Growth Automation

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run in dry-run mode
        required: false
        default: 'true'
      force:
        description: Force posting even if cooldown/limit blocks
        required: false
        default: 'false'
      trend_hint:
        description: Optional trend/topic hint for generated post
        required: false
        default: ''

concurrency:
  group: x-growth-automation
  cancel-in-progress: true

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://freedomforge-max.vercel.app' }}
      X_AUTOMATION_SECRET: ${{ secrets.X_AUTOMATION_SECRET }}
      X_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || (vars.X_SCHEDULED_LIVE == 'true' && 'false' || 'true') }}
      X_FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force || 'false' }}
      X_TREND_HINT: ${{ github.event_name == 'workflow_dispatch' && inputs.trend_hint || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Print X mode
        run: |
          echo "X_DRY_RUN=$X_DRY_RUN"
          echo "X_FORCE=$X_FORCE"
          echo "X_TREND_HINT=$X_TREND_HINT"

      - name: Run X growth automation
        run: npm run x-growth
