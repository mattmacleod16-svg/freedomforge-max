name: Ping Discord On Deploy

on:
  deployment_status:

jobs:
  ping:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    env:
      ENDPOINT_URL: ${{ vars.ALERT_PING_ENDPOINT_URL || 'https://freedomforge-max-qt5y.vercel.app/api/status/ping-discord' }}
      ALERT_SECRET: ${{ secrets.ALERT_SECRET }}
      ENVIRONMENT: ${{ github.event.deployment.environment || 'unknown' }}
      TARGET_URL: ${{ github.event.deployment_status.target_url || '' }}
    steps:
      - name: Validate required secret
        run: |
          if [ -z "$ALERT_SECRET" ]; then
            echo "Missing required GitHub secret: ALERT_SECRET"
            exit 1
          fi

      - name: Call ping endpoint
        run: |
          note="deploy-success env=$ENVIRONMENT"
          if [ -n "$TARGET_URL" ]; then
            note="$note url=$TARGET_URL"
          fi

          response=$(curl -sS -w "\n%{http_code}" -G "$ENDPOINT_URL" \
            -H "x-alert-secret: $ALERT_SECRET" \
            --data-urlencode "source=deploy-success" \
            --data-urlencode "note=$note")

          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)

          echo "HTTP status: $status"
          echo "Response: $body"

          if [ "$status" -ne 200 ]; then
            echo "Ping endpoint returned non-200 status"
            exit 1
          fi

          BODY="$body" python3 - <<'PY'
          import json
          import os
          import sys

          body = os.environ.get('BODY', '')
          try:
              payload = json.loads(body)
          except Exception as exc:
              print(f"Invalid JSON response: {exc}")
              sys.exit(1)

          if payload.get('ok') is not True:
              print(f"Ping failed, response: {payload}")
              sys.exit(1)

          print('Deploy ping succeeded and Discord alert was requested.')
          PY
