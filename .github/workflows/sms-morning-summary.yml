name: SMS Morning Summary

on:
  schedule:
    - cron: '15 13 * * *'
  workflow_dispatch:

concurrency:
  group: sms-morning-summary
  cancel-in-progress: true

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://freedomforge-max.vercel.app' }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
      TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
      SMS_MAX_LEN: ${{ vars.SMS_MAX_LEN || '1200' }}
      SMS_DELIVERY_TIMEOUT_MS: ${{ vars.SMS_DELIVERY_TIMEOUT_MS || '120000' }}
      SMS_DELIVERY_POLL_MS: ${{ vars.SMS_DELIVERY_POLL_MS || '5000' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required secrets
        run: |
          set -euo pipefail
          for key in TWILIO_ACCOUNT_SID TWILIO_AUTH_TOKEN TWILIO_FROM_NUMBER TWILIO_TO_NUMBER; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required GitHub secret: $key"
              exit 1
            fi
          done

      - name: Send SMS summary
        run: node scripts/send-sms-summary.js
