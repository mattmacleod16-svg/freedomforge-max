name: Self Heal Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: self-heal
  cancel-in-progress: true

jobs:
  heal:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://freedomforge-max.vercel.app' }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      ALERT_MENTION: ${{ secrets.ALERT_MENTION }}
      SELF_HEAL_NOTIFY_OK: 'false'
      SELF_HEAL_PROFIT_GUARD_ENABLED: ${{ vars.SELF_HEAL_PROFIT_GUARD_ENABLED || 'true' }}
      SELF_HEAL_PROFIT_GUARD_LOOKBACK_HOURS: ${{ vars.SELF_HEAL_PROFIT_GUARD_LOOKBACK_HOURS || '2' }}
      SELF_HEAL_PROFIT_GUARD_MIN_NET_ETH: ${{ vars.SELF_HEAL_PROFIT_GUARD_MIN_NET_ETH || '0.0005' }}
      SELF_HEAL_PROFIT_GUARD_MIN_SUCCESS_RATE: ${{ vars.SELF_HEAL_PROFIT_GUARD_MIN_SUCCESS_RATE || '0.75' }}
      SELF_HEAL_PROFIT_GUARD_MIN_ATTEMPTS: ${{ vars.SELF_HEAL_PROFIT_GUARD_MIN_ATTEMPTS || '3' }}
      SELF_HEAL_PROFIT_GUARD_LOG_LIMIT: ${{ vars.SELF_HEAL_PROFIT_GUARD_LOG_LIMIT || '800' }}
      SELF_HEAL_DRY_RUN: ${{ vars.SELF_HEAL_DRY_RUN || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Validate webhook secret
        run: |
          if [ -z "$ALERT_WEBHOOK_URL" ]; then
            echo "Missing required GitHub secret: ALERT_WEBHOOK_URL"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Detect, heal, and notify
        run: npm run self-heal
