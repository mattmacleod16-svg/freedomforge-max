name: Self Heal Bot

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: self-heal
  cancel-in-progress: true

jobs:
  heal:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://freedomforge-max-qt5y.vercel.app' }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      ALERT_MENTION: ${{ secrets.ALERT_MENTION }}
      SELF_HEAL_NOTIFY_OK: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate webhook secret
        run: |
          if [ -z "$ALERT_WEBHOOK_URL" ]; then
            echo "Missing required GitHub secret: ALERT_WEBHOOK_URL"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Detect, heal, and notify
        run: npm run self-heal
