name: Ensemble Policy Tuner

on:
  schedule:
    - cron: '10 * * * *'
  workflow_dispatch:
    inputs:
      regime:
        description: Regime used for tuning update
        required: false
        default: neutral
      limit:
        description: Diagnostics lookback event limit (100-5000)
        required: false
        default: '1200'

concurrency:
  group: ensemble-policy-tuner
  cancel-in-progress: true

jobs:
  tune:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://freedomforge-max.vercel.app' }}
      TUNER_REGIME: ${{ github.event_name == 'workflow_dispatch' && inputs.regime || 'neutral' }}
      TUNER_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '1200' }}
    steps:
      - name: Clamp lookback limit
        run: |
          if [ -z "$TUNER_LIMIT" ]; then
            TUNER_LIMIT=1200
          fi
          if [ "$TUNER_LIMIT" -lt 100 ] 2>/dev/null; then
            TUNER_LIMIT=100
          fi
          if [ "$TUNER_LIMIT" -gt 5000 ] 2>/dev/null; then
            TUNER_LIMIT=5000
          fi
          echo "TUNER_LIMIT=$TUNER_LIMIT" >> "$GITHUB_ENV"

      - name: Run ensemble policy tuner
        run: |
          echo "Tuning regime=$TUNER_REGIME limit=$TUNER_LIMIT"
          response="$(curl -fsS -X POST "$APP_BASE_URL/api/status/ensemble/policy" \
            -H 'content-type: application/json' \
            -d "{\"regime\":\"$TUNER_REGIME\",\"limit\":$TUNER_LIMIT}")"

          printf '%s\n' "$response" | python3 -m json.tool

          status="$(printf '%s\n' "$response" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))")"
          if [ "$status" != "ok" ]; then
            echo "Tuner returned non-ok status: $status"
            exit 1
          fi

          applied="$(printf '%s\n' "$response" | python3 -c "import json,sys; print(bool(json.load(sys.stdin).get('result',{}).get('applied')))" )"
          regime="$(printf '%s\n' "$response" | python3 -c "import json,sys; print(json.load(sys.stdin).get('result',{}).get('tuning',{}).get('regime','unknown'))" )"
          decisions="$(printf '%s\n' "$response" | python3 -c "import json,sys; print(json.load(sys.stdin).get('result',{}).get('diagnostics',{}).get('window',{}).get('ensembleDecisions',0))" )"
          top_model="$(printf '%s\n' "$response" | python3 -c "import json,sys; top=json.load(sys.stdin).get('result',{}).get('tuning',{}).get('topAfterTuning') or []; print(top[0].get('model','none') if top else 'none')" )"
          top_score="$(printf '%s\n' "$response" | python3 -c "import json,sys; top=json.load(sys.stdin).get('result',{}).get('tuning',{}).get('topAfterTuning') or []; print(top[0].get('score','n/a') if top else 'n/a')" )"

          echo "Applied: $applied"
          echo "Regime: $regime"
          echo "Decisions: $decisions"
          echo "Top model after tuning: $top_model (score=$top_score)"
