name: Ops Patch Preview Notify

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

concurrency:
  group: ops-patch-preview-notify
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  preview-and-notify:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'automation/monthly-ops-patch')
    runs-on: ubuntu-latest
    env:
      OPS_PATCH_FILE: ops/recommended-env-overrides.env
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      ALERT_MENTION: ${{ secrets.ALERT_MENTION }}
      AUTO_APPLY_ENABLED: ${{ vars.AUTO_APPLY_ENABLED || 'false' }}
      AUTO_APPLY_APPROVED_KEYS: ${{ vars.AUTO_APPLY_APPROVED_KEYS || '' }}
      AUTO_APPLY_REQUIRED_LABEL: ${{ vars.AUTO_APPLY_REQUIRED_LABEL || 'autopatch-approved' }}
      AUTO_APPLY_MAX_DISTRIBUTION_MAX_RETRIES: ${{ vars.AUTO_APPLY_MAX_DISTRIBUTION_MAX_RETRIES || '6' }}
      AUTO_APPLY_MAX_DISTRIBUTION_RETRY_BASE_MS: ${{ vars.AUTO_APPLY_MAX_DISTRIBUTION_RETRY_BASE_MS || '5000' }}
      AUTO_APPLY_MAX_GAS_TOPUP_THRESHOLD: ${{ vars.AUTO_APPLY_MAX_GAS_TOPUP_THRESHOLD || '0.1' }}
      AUTO_APPLY_MAX_GAS_TOPUP_AMOUNT: ${{ vars.AUTO_APPLY_MAX_GAS_TOPUP_AMOUNT || '0.2' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Ensure patch file exists
        run: |
          if [ ! -f "$OPS_PATCH_FILE" ]; then
            echo "Patch file not found: $OPS_PATCH_FILE"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run dry-run preview
        id: preview
        run: |
          set +e
          output=$(DRY_RUN=true npm run apply-railway-env 2>&1)
          code=$?
          echo "$output"

          {
            echo "preview_output<<EOF"
            echo "$output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

          if [ "$code" -ne 0 ]; then
            exit 1
          fi

      - name: Resolve approved keys to apply
        id: approved
        if: steps.preview.outputs.exit_code == '0' && env.AUTO_APPLY_ENABLED == 'true'
        run: |
          python3 - <<'PY' > /tmp/approved_keys.txt
          import os
          from pathlib import Path

          patch_file = Path(os.environ.get('OPS_PATCH_FILE', 'ops/recommended-env-overrides.env'))
          approved_raw = os.environ.get('AUTO_APPLY_APPROVED_KEYS', '')

          approved = {k.strip() for k in approved_raw.split(',') if k.strip()}
          if not patch_file.exists() or not approved:
              print('')
              raise SystemExit(0)

          patch_keys = []
          for line in patch_file.read_text(encoding='utf-8').splitlines():
              t = line.strip()
              if not t or t.startswith('#') or '=' not in t:
                  continue
              key = t.split('=', 1)[0].strip()
              if key:
                  patch_keys.append(key)

          selected = [k for k in patch_keys if k in approved]
          print(','.join(selected))
          PY

          keys=$(cat /tmp/approved_keys.txt)
          echo "keys=$keys" >> "$GITHUB_OUTPUT"

      - name: Enforce required approval label
        id: label_gate
        if: steps.preview.outputs.exit_code == '0' && env.AUTO_APPLY_ENABLED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const required = (process.env.AUTO_APPLY_REQUIRED_LABEL || '').trim();
            if (!required) {
              core.setOutput('allow', 'true');
              core.setOutput('reason', 'no-required-label-configured');
              return;
            }

            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('allow', 'true');
              core.setOutput('reason', 'manual-dispatch');
              return;
            }

            const labels = (context.payload.pull_request?.labels || []).map((l) => l.name);
            if (labels.includes(required)) {
              core.setOutput('allow', 'true');
              core.setOutput('reason', `required-label-present:${required}`);
            } else {
              core.setOutput('allow', 'false');
              core.setOutput('reason', `missing-required-label:${required}`);
            }

      - name: Enforce max-change policy
        id: policy
        if: steps.preview.outputs.exit_code == '0' && env.AUTO_APPLY_ENABLED == 'true' && steps.approved.outputs.keys != '' && steps.label_gate.outputs.allow == 'true'
        run: |
          python3 - <<'PY' > /tmp/policy_result.txt
          import os
          from pathlib import Path

          patch_file = Path(os.environ.get('OPS_PATCH_FILE', 'ops/recommended-env-overrides.env'))
          selected = {k.strip() for k in (os.environ.get('SELECTED_KEYS') or '').split(',') if k.strip()}

          max_retries = int(os.environ.get('AUTO_APPLY_MAX_DISTRIBUTION_MAX_RETRIES', '6'))
          max_retry_ms = int(os.environ.get('AUTO_APPLY_MAX_DISTRIBUTION_RETRY_BASE_MS', '5000'))
          max_gas_threshold = float(os.environ.get('AUTO_APPLY_MAX_GAS_TOPUP_THRESHOLD', '0.1'))
          max_gas_amount = float(os.environ.get('AUTO_APPLY_MAX_GAS_TOPUP_AMOUNT', '0.2'))

          entries = {}
          for line in patch_file.read_text(encoding='utf-8').splitlines():
            t = line.strip()
            if not t or t.startswith('#') or '=' not in t:
              continue
            k, v = t.split('=', 1)
            entries[k.strip()] = v.strip()

          violations = []

          def parse_int(key):
            try:
              return int(entries.get(key, '0'))
            except Exception:
              violations.append(f'{key}: invalid integer value {entries.get(key)}')
              return None

          def parse_float(key):
            try:
              return float(entries.get(key, '0'))
            except Exception:
              violations.append(f'{key}: invalid numeric value {entries.get(key)}')
              return None

          if 'DISTRIBUTION_MAX_RETRIES' in selected and 'DISTRIBUTION_MAX_RETRIES' in entries:
            value = parse_int('DISTRIBUTION_MAX_RETRIES')
            if value is not None and value > max_retries:
              violations.append(f'DISTRIBUTION_MAX_RETRIES={value} exceeds max {max_retries}')

          if 'DISTRIBUTION_RETRY_BASE_MS' in selected and 'DISTRIBUTION_RETRY_BASE_MS' in entries:
            value = parse_int('DISTRIBUTION_RETRY_BASE_MS')
            if value is not None and value > max_retry_ms:
              violations.append(f'DISTRIBUTION_RETRY_BASE_MS={value} exceeds max {max_retry_ms}')

          if 'GAS_TOPUP_THRESHOLD' in selected and 'GAS_TOPUP_THRESHOLD' in entries:
            value = parse_float('GAS_TOPUP_THRESHOLD')
            if value is not None and value > max_gas_threshold:
              violations.append(f'GAS_TOPUP_THRESHOLD={value} exceeds max {max_gas_threshold}')

          if 'GAS_TOPUP_AMOUNT' in selected and 'GAS_TOPUP_AMOUNT' in entries:
            value = parse_float('GAS_TOPUP_AMOUNT')
            if value is not None and value > max_gas_amount:
              violations.append(f'GAS_TOPUP_AMOUNT={value} exceeds max {max_gas_amount}')

          if violations:
            print('allow=false')
            print(f"reason={'; '.join(violations)}")
          else:
            print('allow=true')
            print('reason=ok')
          PY

          cat /tmp/policy_result.txt >> "$GITHUB_OUTPUT"
        env:
          SELECTED_KEYS: ${{ steps.approved.outputs.keys }}

      - name: Dispatch real apply workflow
        if: steps.preview.outputs.exit_code == '0' && env.AUTO_APPLY_ENABLED == 'true' && steps.approved.outputs.keys != '' && steps.label_gate.outputs.allow == 'true' && steps.policy.outputs.allow == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'apply-railway-env.yml',
              ref: context.payload.repository.default_branch,
              inputs: {
                target: 'production',
                apply_keys: `${{ steps.approved.outputs.keys }}`,
                dry_run: 'false',
              },
            });

      - name: Record auto-apply status
        id: auto_apply
        if: always()
        run: |
          status="disabled"
          if [ "${AUTO_APPLY_ENABLED}" = "true" ] && [ "${{ steps.preview.outputs.exit_code }}" = "0" ]; then
            if [ -n "${{ steps.approved.outputs.keys }}" ] && [ "${{ steps.label_gate.outputs.allow }}" != "true" ]; then
              status="blocked-by-label (${{ steps.label_gate.outputs.reason }})"
            elif [ -n "${{ steps.approved.outputs.keys }}" ] && [ "${{ steps.policy.outputs.allow }}" = "true" ]; then
              status="dispatched (keys=${{ steps.approved.outputs.keys }})"
            elif [ -n "${{ steps.approved.outputs.keys }}" ] && [ "${{ steps.policy.outputs.allow }}" != "true" ]; then
              status="blocked-by-policy (${{ steps.policy.outputs.reason }})"
            else
              status="enabled-but-no-approved-keys-matched"
            fi
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Send Discord notification
        if: always() && env.ALERT_WEBHOOK_URL != ''
        env:
          PREVIEW_OUTPUT: ${{ steps.preview.outputs.preview_output }}
          EXIT_CODE: ${{ steps.preview.outputs.exit_code }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTO_APPLY_STATUS: ${{ steps.auto_apply.outputs.status }}
        run: |
          python3 - <<'PY'
          import json
          import os

          webhook = os.environ.get('ALERT_WEBHOOK_URL', '').strip()
          mention = os.environ.get('ALERT_MENTION', '').strip()
          output = os.environ.get('PREVIEW_OUTPUT', '')
          exit_code = os.environ.get('EXIT_CODE', '')
          run_url = os.environ.get('RUN_URL', '')
          pr_number = os.environ.get('PR_NUMBER', '')
          auto_apply_status = os.environ.get('AUTO_APPLY_STATUS', '')

          status = "✅ success" if exit_code == "0" else "❌ failure"
          title = f"Ops patch dry-run preview {status}"
          if pr_number:
              title += f" (PR #{pr_number})"

          safe_output = (output or '').strip()
          if len(safe_output) > 1500:
              safe_output = safe_output[:1500] + "\n... (truncated)"

          lines = [title, f"Run: {run_url}"]
          if auto_apply_status:
              lines.append(f"Auto-apply: {auto_apply_status}")
          if safe_output:
              lines.append("```\n" + safe_output + "\n```")

          message = "\n".join(lines)
          if mention and "discord.com/api/webhooks/" in webhook:
              message = f"{mention} {message}"

          payload = {"content": message, "text": message}

          import urllib.request
          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          with urllib.request.urlopen(req) as resp:
              _ = resp.read()
          PY
