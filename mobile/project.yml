name: FreedomForge
options:
  bundleIdPrefix: com.freedomforge
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  FreedomForge:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: FreedomForge
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freedomforge.monitor
        INFOPLIST_FILE: FreedomForge/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        ENABLE_PREVIEWS: true
    dependencies:
      - framework: Charts.framework
        embed: false
